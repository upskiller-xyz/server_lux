# Rate limiting zones (defined at http level)
# api: 30 requests/min per IP for API endpoints
# status: 60 requests/min per IP for health check
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=status:10m rate=60r/m;

upstream server_lux {
    server server-lux:8080 fail_timeout=0;
}

# --- HTTP: redirect everything to HTTPS ---------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;
    server_tokens off;
    return 301 https://$host$request_uri;
}

# --- HTTPS: the public API gateway --------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # TLS: origin cert mounted from ./certs (see docker-compose.scaleway.yml).
    # Cloudflare Origin Certificate (origin.pem/.key) — no certbot/ACME in-container.
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Hide nginx version from responses
    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    client_max_body_size 50M;

    # Health check - rate limited but no auth required
    location = / {
        limit_req zone=status burst=10 nodelay;

        proxy_pass http://server_lux;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints - stricter rate limiting
    location /v1/ {
        limit_req zone=api burst=5 nodelay;

        proxy_pass http://server_lux;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 900s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Swagger UI (internal/dev use)
    location /docs/ {
        proxy_pass http://server_lux;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /apispec.json {
        proxy_pass http://server_lux;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /flasgger_static/ {
        proxy_pass http://server_lux;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block common scanner/exploit paths immediately
    location ~* \.(php|asp|aspx|jsp|cgi|env|git|sql)$ {
        return 444;
    }

    location ~* ^/(admin|wp-admin|phpmyadmin|login|shell|console|manager|actuator|solr|jenkins) {
        return 444;
    }

    # Drop everything else not explicitly handled
    location / {
        return 444;
    }
}
