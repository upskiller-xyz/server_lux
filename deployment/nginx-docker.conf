# Rate limiting zones (defined at http level)
# api: 30 requests/min per IP for API endpoints
# status: 60 requests/min per IP for health check
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=status:10m rate=60r/m;

upstream server_lux {
    server server-lux:8080 fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Hide nginx version from responses
    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    client_max_body_size 50M;

    # Health check - rate limited but no auth required
    location = / {
        limit_req zone=status burst=10 nodelay;

        proxy_pass http://server_lux;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints - stricter rate limiting
    location /v1/ {
        limit_req zone=api burst=5 nodelay;

        proxy_pass http://server_lux;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 900s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Block common scanner/exploit paths immediately
    location ~* \.(php|asp|aspx|jsp|cgi|env|git|sql)$ {
        return 444;
    }

    location ~* ^/(admin|wp-admin|phpmyadmin|login|shell|console|manager|actuator|solr|jenkins) {
        return 444;
    }

    # Drop everything else not explicitly handled
    location / {
        return 444;
    }
}
