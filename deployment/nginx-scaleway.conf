# Public gateway for the Scaleway deployment — TLS terminated here behind Cloudflare.
#
# Pattern: Cloudflare (proxied / orange cloud) → this origin over HTTPS.
#   - SSL/TLS mode in Cloudflare: Full (strict).
#   - Origin cert: a Cloudflare Origin Certificate (15-year, free) mounted at
#     /etc/nginx/certs/origin.pem (+ .key). No certbot/ACME needed in the container.
#   - Real client IP is restored from Cloudflare's CF-Connecting-IP header so rate
#     limiting and logs see the visitor, not the Cloudflare edge.

# Rate limiting zones (http context)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=status:10m rate=60r/m;

upstream server_lux {
    server server-lux:8080 fail_timeout=0;
}

# --- Restore real client IP from Cloudflare (current published ranges) ---------
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# --- HTTP: redirect everything to HTTPS ---------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;
    server_tokens off;
    return 301 https://$host$request_uri;
}

# --- HTTPS: the public API gateway --------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    client_max_body_size 50M;

    # Health check - rate limited, no auth
    location = / {
        limit_req zone=status burst=10 nodelay;
        proxy_pass http://server_lux;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints - stricter rate limiting, long timeouts for inference
    location /v1/ {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://server_lux;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 900s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Swagger UI / API spec
    location /docs/ {
        proxy_pass http://server_lux;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /apispec.json {
        proxy_pass http://server_lux;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /flasgger_static/ {
        proxy_pass http://server_lux;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block common scanner/exploit paths
    location ~* \.(php|asp|aspx|jsp|cgi|env|git|sql)$ { return 444; }
    location ~* ^/(admin|wp-admin|phpmyadmin|login|shell|console|manager|actuator|solr|jenkins) { return 444; }

    # Drop everything else
    location / { return 444; }
}
