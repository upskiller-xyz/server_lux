services:
  # Main Gateway Server (port 8080)
  server-lux:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: server-lux
    restart: unless-stopped
    labels:
      - "autoheal=true"
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DEPLOYMENT_MODE=local
      - WORKERS=${WORKERS:-1}
      - THREADS=${THREADS:-8}
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - ENCODER_SERVICE_URL=http://encoder-service:8082
      - MODEL_SERVICE_URL=http://model-service:8083
      - MERGER_SERVICE_URL=http://merger-service:8084
      - OBSTRUCTION_SERVICE_URL=http://obstruction-service:8081
      - STATS_SERVICE_URL=http://stats-service:8085
    env_file:
      - .env.full-stack
    depends_on:
      obstruction-service:
        condition: service_healthy
      encoder-service:
        condition: service_healthy
      model-service:
        condition: service_healthy
      merger-service:
        condition: service_healthy
      stats-service:
        condition: service_healthy
    networks:
      - lux-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Obstruction Service (port 8081)
  obstruction-service:
    build:
      context: ./services/server_obstruction
      dockerfile: Dockerfile
    container_name: obstruction-service
    restart: unless-stopped
    labels:
      - "autoheal=true"
    environment:
      - PORT=8081
      - WORKERS=${WORKERS:-1}
      - THREADS=${THREADS:-8}
      - FLASK_ENV=production
    networks:
      - lux-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Encoder Service (port 8082)
  encoder-service:
    build:
      context: ./services/server_encoder
      dockerfile: Dockerfile
    container_name: encoder-service
    restart: unless-stopped
    labels:
      - "autoheal=true"
    environment:
      - PORT=8082
      - WORKERS=${WORKERS:-1}
      - THREADS=${THREADS:-8}
      - FLASK_ENV=production
    networks:
      - lux-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Model Service (port 8083)
  model-service:
    build:
      context: ./services/server_model
      dockerfile: Dockerfile
    container_name: model-service
    restart: unless-stopped
    labels:
      - "autoheal=true"
    environment:
      - PORT=8083
      - WORKERS=${WORKERS:-1}
      - THREADS=${THREADS:-8}
      - FLASK_ENV=production
      - MODEL_URL_TEMPLATE=${MODEL_URL_TEMPLATE}
      - SCW_ACCESS_KEY=${SCW_ACCESS_KEY}
      - SCW_SECRET_KEY=${SCW_SECRET_KEY}
      - SCW_REGION=${SCW_REGION:-fr-par}
      - SCW_ENDPOINT_URL=${SCW_ENDPOINT_URL:-https://s3.fr-par.scw.cloud}
    networks:
      - lux-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8083/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Merger Service (port 8084)
  merger-service:
    build:
      context: ./services/server_merger
      dockerfile: Dockerfile
    container_name: merger-service
    restart: unless-stopped
    labels:
      - "autoheal=true"
    environment:
      - PORT=8084
      - WORKERS=${WORKERS:-1}
      - THREADS=${THREADS:-8}
      - FLASK_ENV=production
    networks:
      - lux-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8084/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Stats Service (port 8085)
  stats-service:
    build:
      context: ./services/server_stats
      dockerfile: Dockerfile
    container_name: stats-service
    restart: unless-stopped
    labels:
      - "autoheal=true"
    environment:
      - PORT=8085
      - WORKERS=${WORKERS:-1}
      - THREADS=${THREADS:-8}
      - FLASK_ENV=production
    networks:
      - lux-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  autoheal:
    image: willfarrell/autoheal
    container_name: autoheal
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal

networks:
  lux-network:
    driver: bridge
