version: '3.8'

services:
  # Main orchestration server
  main:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: server_lux_main
    ports:
      - "8080:8080"
    environment:
      - DEPLOYMENT_MODE=local
      - PORT=8080
      - API_TOKEN=${API_TOKEN:-your_token_here}
      # Telemetry emission (fire-and-forget). Unset to disable.
      - TELEMETRY_SERVICE_URL=http://telemetry:8086
    depends_on:
      colormanage:
        condition: service_healthy
      daylight:
        condition: service_healthy
      metrics:
        condition: service_healthy
      obstruction:
        condition: service_healthy
      encoder:
        condition: service_healthy
      postprocess:
        condition: service_healthy
      telemetry:
        condition: service_healthy
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Color management service
  colormanage:
    image: ${COLORMANAGE_IMAGE:-europe-north2-docker.pkg.dev/daylight-factor/daylight-server-docker-repo/daylight-colormanage-img:latest}
    container_name: server_colormanage
    environment:
      - PORT=8080
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Daylight simulation service
  daylight:
    image: ${DAYLIGHT_IMAGE:-europe-north2-docker.pkg.dev/daylight-factor/daylight-server-docker-repo/daylight-model-img:latest}
    container_name: server_daylight
    environment:
      - PORT=8080
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Metrics/evaluation service
  metrics:
    image: ${METRICS_IMAGE:-europe-north2-docker.pkg.dev/daylight-factor/daylight-server-docker-repo/daylight-metrics-img:latest}
    container_name: server_metrics
    environment:
      - PORT=8080
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Obstruction calculation service
  obstruction:
    image: ${OBSTRUCTION_IMAGE:-europe-north2-docker.pkg.dev/daylight-factor/daylight-server-docker-repo/daylight-obstruction-img:latest}
    container_name: server_obstruction
    environment:
      - PORT=8080
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Encoder service
  encoder:
    image: ${ENCODER_IMAGE:-europe-north2-docker.pkg.dev/daylight-factor/daylight-server-docker-repo/daylight-encoder-img:latest}
    container_name: server_encoder
    environment:
      - PORT=8080
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Postprocessing service
  postprocess:
    image: ${POSTPROCESS_IMAGE:-europe-north2-docker.pkg.dev/daylight-factor/daylight-server-docker-repo/daylight-postprocess-img:latest}
    container_name: server_postprocess
    environment:
      - PORT=8080
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Telemetry ingestion & analysis service
  telemetry:
    image: ${TELEMETRY_IMAGE:-europe-north2-docker.pkg.dev/daylight-factor/daylight-server-docker-repo/daylight-telemetry-img:latest}
    container_name: server_telemetry
    environment:
      - PORT=8086
      - SQLITE_DB_PATH=/data/telemetry.db
      - TELEMETRY_HMAC_SALT=${TELEMETRY_HMAC_SALT:-change_me_to_a_long_random_secret}
      - TELEMETRY_IDENTITY_MODE=${TELEMETRY_IDENTITY_MODE:-anonymous}
    volumes:
      - telemetry_data:/data
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8086/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  autoheal:
    image: willfarrell/autoheal
    container_name: autoheal
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all

networks:
  microservices:
    driver: bridge

volumes:
  telemetry_data:
